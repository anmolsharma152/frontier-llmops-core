judge:
  model: "gpt-4o"
  temperature: 0.0
  rubric_template: |
    Score the following response on a scale of 1-5 for each criterion:
    - Accuracy: Is the information correct?
    - Relevance: Does it address the prompt?
    - Clarity: Is it well-structured and easy to understand?

    Prompt: {prompt}
    Response: {response}
    Reference: {reference}

    Return a JSON object with scores and a brief justification.

metrics:
  - "bleu"
  - "rouge"
  - "bertscore"
  - "meteor"

eval_dataset:
  source: null  # null = use built-in examples; path to Phase-1 JSONL
  num_samples: 50
